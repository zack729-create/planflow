<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanFlow — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0c12;
      --surface: #111420;
      --surface2: #161924;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(99,102,241,0.6);
      --text: #e8eaf0;
      --muted: #5a6080;
      --subtle: #8890aa;
      --accent: #6366f1;
      --error: #f87171;
      --error-bg: rgba(248,113,113,0.08);
      --glow: rgba(99,102,241,0.15);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(99,102,241,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 14px;
      margin-bottom: 1rem;
      box-shadow: 0 0 32px rgba(99,102,241,0.35);
    }

    .logo-wrap svg {
      width: 26px;
      height: 26px;
      fill: white;
    }

    .brand h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .brand p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 1.75rem;
    }

    .error-box {
      display: none;
      align-items: center;
      gap: 0.625rem;
      background: var(--error-bg);
      border: 1px solid rgba(248,113,113,0.2);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      font-size: 0.8125rem;
      color: var(--error);
    }
    .error-box.on { display: flex; }
    .error-box svg { flex-shrink: 0; width: 15px; height: 15px; }

    .group { margin-bottom: 1.125rem; }

    .group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--subtle);
      margin-bottom: 0.5rem;
      letter-spacing: 0.02em;
    }

    .field { position: relative; }

    .field-icon {
      position: absolute;
      left: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      pointer-events: none;
      color: var(--muted);
    }

    .group input {
      width: 100%;
      padding: 0.75rem 0.875rem 0.75rem 2.625rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .group input::placeholder { color: var(--muted); }

    .group input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .group input:disabled { opacity: 0.45; cursor: not-allowed; }

    .eye-btn {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      display: flex;
      align-items: center;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .eye-btn:hover { color: var(--subtle); }
    .eye-btn svg { width: 16px; height: 16px; }

    .btn {
      width: 100%;
      padding: 0.8125rem;
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;h
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;h
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }

    .btn:hover:not(:disabled) {
      opacity: 0.9;
      box-shadow: 0 4px 28px rgba(99,102,241,0.45);
    }

    .btn:active:not(:disabled) { transform: scale(0.985); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .lockout {
      display: none;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
      margin-top: 1rem;
    }
    .lockout.on { display: block; }
    .lockout span { color: var(--error); font-weight: 600; font-variant-numeric: tabular-nums; }

    .footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
        <circle cx="17.5" cy="17.5" r="3.5"/>
      </svg>
    </div>
    <h1>PlanFlow</h1>
    <p>Sign in to your workspace</p>
  </div>

  <div class="card">
    <div class="error-box" id="errBox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errText"></span>
    </div>

    <form id="loginForm" autocomplete="on">
      <div class="group">
        <label for="email">Email address</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <polyline points="22,4 12,13 2,4"/>
          </svg>
          <input type="email" id="email" name="email" placeholder="admin@planflow.io" autocomplete="email" required>
        </div>
      </div>

      <div class="group">
        <label for="password">Password</label>
        <div class="field">
          <svg class="field-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="eye-btn" id="eyeBtn" aria-label="Toggle password">
            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn" id="loginBtn">Sign in</button>
    </form>

    <div class="lockout" id="lockout">
      Too many attempts. Try again in <span id="countdown">60</span>s
    </div>
  </div>

  <div class="footer">&copy; 2026 PlanFlow. All rights reserved.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  // ===== CONFIGURE HERE =====
  const SUPABASE_URL = 'https://wvayzobqkmiyqbjygmnx.supabase.co'
  const SUPABASE_ANON_KEY = 'sb_publishable_qRIcbMhrrVhdNRjisxwCJg_sA3k-HNS'
  // ==========================

  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  let fails = 0
  const MAX = 3
  const LOCK = 60
  let lockEnd = null
  let lockTimer = null

  const form      = document.getElementById('loginForm')
  const emailIn   = document.getElementById('email')
  const passIn    = document.getElementById('password')
  const btn       = document.getElementById('loginBtn')
  const errBox    = document.getElementById('errBox')
  const errText   = document.getElementById('errText')
  const lockout   = document.getElementById('lockout')
  const countdown = document.getElementById('countdown')
  const eyeBtn    = document.getElementById('eyeBtn')
  const eyeIcon   = document.getElementById('eyeIcon')

  ;(async () => {
    const { data: { session } } = await sb.auth.getSession()
    if (session) window.location.href = 'dashboard.html'
  })()

  eyeBtn.addEventListener('click', () => {
    const show = passIn.type === 'password'
    passIn.type = show ? 'text' : 'password'
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
  })

  function showErr(msg) { errText.textContent = msg; errBox.classList.add('on') }
  function hideErr() { errBox.classList.remove('on') }

  function startLock() {
    lockEnd = Date.now() + LOCK * 1000
    btn.disabled = emailIn.disabled = passIn.disabled = true
    lockout.classList.add('on')
    lockTimer = setInterval(() => {
      const rem = Math.ceil((lockEnd - Date.now()) / 1000)
      if (rem <= 0) {
        clearInterval(lockTimer)
        lockEnd = null; fails = 0
        btn.disabled = emailIn.disabled = passIn.disabled = false
        lockout.classList.remove('on')
        hideErr()
      } else {
        countdown.textContent = rem
      }
    }, 250)
  }

  form.addEventListener('submit', async e => {
    e.preventDefault()
    if (lockEnd && Date.now() < lockEnd) return
    hideErr()

    const email = emailIn.value.trim()
    const password = passIn.value
    if (!email || !password) { showErr('Please enter your email and password.'); return }

    btn.disabled = true
    btn.innerHTML = '<span class="spinner"></span>Signing in…'

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password })
      if (error) {
        fails++
        if (fails >= MAX) {
          showErr('Too many failed attempts. Locked for 60 seconds.')
          startLock()
        } else {
          const left = MAX - fails
          showErr(`Invalid credentials. ${left} attempt${left > 1 ? 's' : ''} remaining.`)
          btn.disabled = false
        }
      } else if (data.session) {
        window.location.href = 'dashboard.html'
        return
      }
    } catch {
      showErr('Connection error. Please try again.')
      btn.disabled = false
    }

    btn.innerHTML = 'Sign in'
    if (!lockEnd) btn.disabled = false
  })
</script>
</body>
</html>
