<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlanFlow — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0c12; --surface: #111420; --surface2: #161924;
      --border: rgba(255,255,255,0.07); --text: #e8eaf0;
      --muted: #5a6080; --subtle: #8890aa; --accent: #6366f1;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 56px; background: rgba(17,20,32,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; z-index: 100; }
    .nav-logo { display: flex; align-items: center; gap: 0.625rem; font-size: 1rem; font-weight: 600; }
    .logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 7px; display: flex; align-items: center; justify-content: center; }
    .logo-icon svg { width: 15px; height: 15px; fill: white; }
    .nav-user { font-size: 0.8125rem; color: var(--subtle); background: var(--surface2); border: 1px solid var(--border); padding: 0.375rem 0.875rem; border-radius: 20px; }
    .nav-user span { color: var(--text); font-weight: 500; }
    .btn-logout { font-size: 0.8125rem; font-weight: 500; color: var(--muted); background: none; border: 1px solid var(--border); padding: 0.375rem 0.875rem; border-radius: 8px; cursor: pointer; font-family: inherit; transition: color 0.2s, border-color 0.2s; }
    .btn-logout:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
    .layout { display: flex; min-height: 100vh; padding-top: 56px; position: relative; z-index: 1; }
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; position: fixed; top: 56px; left: 0; bottom: 0; }
    .sidebar-label { font-size: 0.6875rem; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; padding: 0 0.75rem; margin: 1rem 0 0.5rem; }
    .sidebar-label:first-child { margin-top: 0; }
    .nav-item { display: flex; align-items: center; justify-content: space-between; gap: 0.625rem; padding: 0.6rem 0.75rem; border-radius: 8px; font-size: 0.875rem; color: var(--subtle); cursor: pointer; transition: background 0.15s, color 0.15s; text-decoration: none; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,0.12); color: var(--accent); }
    .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-item span { flex: 1; }
    .badge-soon { font-size: 0.6rem; font-weight: 600; background: var(--surface2); color: var(--muted); padding: 0.15rem 0.4rem; border-radius: 4px; border: 1px solid var(--border); }
    .main { margin-left: 220px; flex: 1; padding: 2.5rem; display: flex; align-items: center; justify-content: center; }
    .welcome-card { text-align: center; max-width: 480px; }
    .welcome-icon { width: 64px; height: 64px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(168,85,247,0.2)); border: 1px solid rgba(99,102,241,0.3); border-radius: 18px; display: flex; align-items: center; justify-content: center; }
    .welcome-icon svg { width: 30px; height: 30px; fill: var(--accent); }
    .welcome-card h1 { font-size: 1.75rem; font-weight: 600; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
    .welcome-card p { font-size: 0.9375rem; color: var(--subtle); line-height: 1.6; margin-bottom: 1.5rem; }
    .welcome-email { display: inline-block; font-size: 0.8125rem; color: var(--accent); background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); padding: 0.375rem 1rem; border-radius: 20px; margin-bottom: 1.5rem; }
    .phase-badge { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.8125rem; color: var(--muted); background: var(--surface); border: 1px solid var(--border); padding: 0.5rem 1.25rem; border-radius: 10px; }
    .phase-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 999; }
    .spinner { width: 32px; height: 32px; border: 3px solid rgba(99,102,241,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="loading-screen" id="loader"><div class="spinner"></div></div>
<nav class="navbar" id="navbar" style="display:none">
  <div class="nav-logo"><div class="logo-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><circle cx="17.5" cy="17.5" r="3.5"/></svg></div>PlanFlow</div>
  <div class="nav-user">Connecte en tant que <span id="userEmail"></span></div>
  <button class="btn-logout" id="logoutBtn">Deconnexion</button>
</nav>
<div class="layout" id="layout" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-label">Navigation</div>
    <a class="nav-item active" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Dashboard</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span>Planning</span><span class="badge-soon">Bientot</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span>Stock</span><span class="badge-soon">Bientot</span></a>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Donnees</span><span class="badge-soon">Bientot</span></a>
    <div class="sidebar-label">Systeme</div>
    <a class="nav-item" href="#"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M4.93 4.93a10 10 0 0 0 0 14.14"/></svg><span>Parametres</span><span class="badge-soon">Bientot</span></a>
  </aside>
  <main class="main">
    <div class="welcome-card">
      <div class="welcome-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><circle cx="17.5" cy="17.5" r="3.5"/></svg></div>
      <h1>Bienvenue sur PlanFlow</h1>
      <p>Votre espace de gestion de planning, stock et donnees est en cours de construction.</p>
      <div class="welcome-email" id="welcomeEmail"></div><br>
      <div class="phase-badge">Phase 4 en cours de developpement</div>
    </div>
  </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://wvayzobqkmiyqbjygmnx.supabase.co'
  const SUPABASE_KEY = 'sb_publishable_qRIcbMhrrVhdNRjisxwCJg_sA3k-HNS'
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
  ;(async () => {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { window.location.href = 'index.html'; return }
    const email = session.user.email
    document.getElementById('userEmail').textContent = email
    document.getElementById('welcomeEmail').textContent = email
    document.getElementById('loader').style.display = 'none'
    document.getElementById('navbar').style.display = 'flex'
    document.getElementById('layout').style.display = 'flex'
  })()
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await sb.auth.signOut()
    window.location.href = 'index.html'
  })
</script>
</body>
  </html>
